---
- name: Install utilities
  apt:
    name: [ca-certificates, curl, tar]
    state: present
    update_cache: true
    
- name: Create MinIO account
  user:
    name: minio
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/minio
    create_home: true
    
- name: Download MinIO server
  get_url:
    url: https://dl.min.io/server/minio/release/linux-amd64/minio
    dest: /usr/local/bin/minio
    mode: '0755'
    
- name: Download MinIO client
  get_url:
    url: https://dl.min.io/client/mc/release/linux-amd64/mc
    dest: /usr/local/bin/mc
    mode: '0755'
    
- name: Configure credentials
  copy:
    dest: /etc/default/minio
    mode: '0600'
    content: |
      MINIO_ROOT_USER=AKIA1MDSL34K3D01
      MINIO_ROOT_PASSWORD=IMDSSecretKeyForLabOnly123456789
      
- name: Install service
  copy:
    src: minio.service
    dest: /etc/systemd/system/minio.service
    
- name: Start MinIO
  systemd:
    name: minio
    daemon_reload: true
    enabled: true
    state: restarted
    
- name: Wait for MinIO
  uri:
    url: http://127.0.0.1:9000/minio/health/live
    status_code: 200
  register: health
  retries: 30
  delay: 2
  until: health.status == 200
  
- name: Create backup staging directory
  file:
    path: /tmp/techcorp-backup
    state: directory
    mode: '0700'
    
- name: Copy backup artifacts
  copy:
    src: "{{ item }}"
    dest: "/tmp/techcorp-backup/{{ item }}"
    mode: '0600'
  loop: [portainer_lite_key, notes.txt, docker-compose.yml]
  
- name: Create newest backup archive
  archive:
    path: /tmp/techcorp-backup
    dest: /tmp/backup-2024-11-30.tar.gz
    format: gz
    
- name: Create older backup placeholder
  copy:
    dest: /tmp/backup-2024-10-31.tar.gz
    content: "historical placeholder\n"
    
- name: Configure mc alias
  command: mc alias set local http://127.0.0.1:9000 AKIA1MDSL34K3D01 IMDSSecretKeyForLabOnly123456789
  changed_when: false
  
- name: Create bucket
  command: mc mb --ignore-existing local/techcorp-backups
  changed_when: false
  
- name: Upload backups
  command: "mc cp {{ item }} local/techcorp-backups/"
  loop: [/tmp/backup-2024-10-31.tar.gz, /tmp/backup-2024-11-30.tar.gz]
  changed_when: false
